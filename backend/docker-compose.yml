# docker-compose.yml
services:
  render-backend:
    build: .
    container_name: render-backend
    restart: unless-stopped
    ports:
      - "14855:3000"
    env_file:
      - /home/ubuntu/app-69b6fb58161d976b43c95281/backend/.env
    volumes:
      - /home/ubuntu/app-69b6fb58161d976b43c95281/backend:/app
      - /app/node_modules
    networks:
      - appnet
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  render-worker:
    build: .
    restart: unless-stopped
    command: npm run worker
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - appnet
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  appnet:

volumes:
  rabbitmq_data:
  redis_data: